name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"
        
    - name: Install dependencies
      run: uv sync --all-extras --dev
        
    - name: Run Ruff Check
      run: uv run ruff check .

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"
        
    - name: Install dependencies
      run: uv sync --all-extras --dev
        
    - name: Run Ruff Format Check
      run: uv run ruff format . --check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"
        
    - name: Install dependencies
      run: uv sync --all-extras --dev
        
    - name: Run tests
      env:
        PYTHONPATH: .
      run: |
        if [ -d "tests" ]; then
          uv run pytest tests/
        else
          echo "No tests directory found, skipping tests."
        fi
